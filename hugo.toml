baseURL = "https://realemania.com/"
title = "Realemania"
theme = "PaperMod"

defaultContentLanguage = "es"
defaultContentLanguageInSubdir = true

# ==================== IDIOMAS ====================

[languages]

[languages.es]
    locale = "es"
    label = "Español"
    weight = 1
    contentDir = "content/es"

[languages.de]
    locale = "de"
    label = "Deutsch"
    weight = 2
    contentDir = "content/de"

# ==================== MENÚ ESPAÑOL ====================

[[languages.es.menu.main]]
    identifier = "inicio"
    name = "Inicio"
    url = "/es/"
    weight = 1

[[languages.es.menu.main]]
    identifier = "sobre-mi"
    name = "Sobre mí"
    url = "/es/sobre-mi/"
    weight = 2

[[languages.es.menu.main]]
    identifier = "recursos"
    name = "Recursos"
    url = "/es/recursos/"
    weight = 3

[[languages.es.menu.main]]
    identifier = "asesorias"
    name = "Asesorías"
    url = "/es/asesorias/"
    weight = 4

[[languages.es.menu.main]]
    identifier = "contacto"
    name = "Contacto"
    url = "/es/contacto/"
    weight = 5

# ==================== MENÜ DEUTSCH ====================

[[languages.de.menu.main]]
    identifier = "start"
    name = "Start"
    url = "/de/"
    weight = 1

[[languages.de.menu.main]]
    identifier = "ueber-mich"
    name = "Über mich"
    url = "/de/ueber-mich/"
    weight = 2

[[languages.de.menu.main]]
    identifier = "ressourcen"
    name = "Ressourcen"
    url = "/de/ressourcen/"
    weight = 3

[[languages.de.menu.main]]
    identifier = "beratungen"
    name = "Beratungen"
    url = "/de/beratungen/"
    weight = 4

[[languages.de.menu.main]]
    identifier = "kontakt"
    name = "Kontakt"
    url = "/de/kontakt/"
    weight = 5

# ==================== PARÁMETROS ====================

[params]
    description = "Más integración, menos ilusión"
    defaultTheme = "light"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowToc = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true

# ==================== HOMEPAGE ====================

[params.profileMode]
    enabled = false