baseURL = "https://realemania.com/"
title = "Realemania"
theme = "PaperMod"

defaultContentLanguage = "es"
defaultContentLanguageInSubdir = false

# ==================== IDIOMAS ====================

[languages]

[languages.es]
    locale = "es"
    label = "Español"
    weight = 1
    contentDir = "content/es"

# ==================== MENÚ ESPAÑOL ====================

[[languages.es.menu.main]]
    identifier = "inicio"
    name = "Inicio"
    url = "/es/"
    weight = 1

[[languages.es.menu.main]]
    identifier = "sobre-mi"
    name = "Sobre mí"
    url = "/es/sobre-mi/"
    weight = 2

[[languages.es.menu.main]]
    identifier = "recursos"
    name = "Recursos"
    url = "/es/recursos/"
    weight = 3

[[languages.es.menu.main]]
    identifier = "asesorias"
    name = "Asesorías"
    url = "/es/asesorias/"
    weight = 4

[[languages.es.menu.main]]
    identifier = "contacto"
    name = "Contacto"
    url = "/es/contacto/"
    weight = 5

# ==================== PARÁMETROS ====================

[params]
    description = "Más integración, menos ilusión"
    defaultTheme = "light"
    ShowReadingTime = true
    ShowShareButtons = false
    ShowToc = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    disableAnchoredHeadings = true

# ==================== HOMEPAGE ====================

[params.profileMode]
    enabled = false