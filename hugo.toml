baseURL = "https://realemania.netlify.app"
title = "Realemania"
theme = "PaperMod"

# ==================== MULTILINGÜE ====================
defaultContentLanguage = "es"

[languages]
[languages.es]
    languageCode = "es"
    languageName = "Español"
    weight = 1
    contentDir = "content/es"

[languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    weight = 2
    contentDir = "content/de"

# ==================== DESCRIPCIÓN ====================
[params]
    description = "Más integración, menos ilusión"
    defaultTheme = "light"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowToc = true

[params.profileMode]
    enabled = true
    title = "Realemania"
    subtitle = "Más integración, menos ilusión"